<div class="container-fluid todo--wrapper">
  <div class="row">
    <div class="col-12 col-lg-8">
      <header class="d-flex align-items-start justify-content-between w-100">
        <div class="d-flex align-items-start">
          <i class="icon icon--zap flex-shrink-0 me-2 mt-1"></i>
          <div class="d-flex flex-column">
            <h2 class="clr--14181F font-26 fw-bold mb-0">To-Do’s</h2>
            <p class="mb-0 clr--6B7280 fw-normal font-plus-jakarta">View pending, due for followup, or new referral</p>
          </div>
        </div>
        <div class="d-flex gap-2 flex-wrap align-items-center">
          <button type="button" class="btn btn-orange btn-lg rounded-3">
            <i class="icon icon--w-msg me-2"></i>
            Receive Activity Summary</button>
          <mat-form-field appearance="outline" class="secondary--dd">
            <mat-select placeholder="All Status">
              <mat-option value="01">Pending</mat-option>
              <mat-option value="02">Approved</mat-option>
              <mat-option value="30">Rejected</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

      </header>
    </div>
    <div class="col-12 col-lg-4">
      <section class="priority-card w-100 p-4">
        <div class="priority-card__header">
          <h2 class="clr--fff font-26 fw-bold mb-1">All Priority To-Do's</h2>
          <p class="mb-0 clr--fff fw-normal font-plus-jakarta">View pending, due for followup, or new referral</p>
        </div>

        <div class="todo-list">
          @for (todo of todos; track todo.name) {
          <div class="todo-item d-flex align-items-center">
            <div class="todo-item__avatar font-16 d-flex align-items-center justify-content-center flex-shrink-0">
              {{ todo.initials }}
            </div>

            <div class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center w-100">
              <div class="todo-item__content">
                <h3 class="font-16 mb-1">{{ todo.name }}</h3>
                <p class="font-plus-jakarta font-12 mb-0">{{ todo.phone }}</p>
              </div>
              <div class="d-flex align-items-center gap-2">
                <div class="todo-item__due font-12 font-plus-jakarta ">
                  {{ todo.due }}
                </div>
                <button type="button" class="btn btn-light btn-lg rounded-3 icon--button--36">
                  <img src="images/pin-img.png" alt="icon pin" class="">
                </button>
                <button type="button" class="btn btn-light btn-lg rounded-3 icon--button--36 eye--btn">
                  <img src="images/eye-orange.svg" alt="icon pin" class="">
                </button>
              </div>
            </div>


          </div>
          }
        </div>
      </section>
    </div>
  </div>
</div>
