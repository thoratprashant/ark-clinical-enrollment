<div class="container-fluid profile--wrapper">
  <div class="row">
    <div class="col-12">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a routerLink="/admin/profile">Profile</a></li>
          <li class="breadcrumb-item active" aria-current="page">Change Password</li>
        </ol>
      </nav>
    </div>
    <div class="col-12 mb-3 mb-sm-4">
      <div class="top--banner d-flex flex-column ">
        <div class="d-flex flex-column">
          <h1 class="mb-2">Update Your Password</h1>
          <p class="m-0 font-16">Ensure your account stays secure by using a strong password</p>
        </div>
      </div>
    </div>


    <div class="col-12 mb-4">
      <div class="info--note font-16 font-plus-jakarta">
        Security Notce: After Updating your password, you may be logged out of other devices for security purposes
      </div>
    </div>

    <div class="col-12">
      <div class="row">
        <div class="col-12 mb-4">
          <label id="email" class="form-label">Current Password</label>
          <input name="email" type="password" class="form-control" value="Sarah Mitchell"
            placeholder="Enter Current Password" />
        </div>
        <div class="col-12 col-sm-6 mb-4">
          <label id="np" class="form-label">New password</label>
          <input name="np" type="password" class="form-control" value="your@email.com"
            placeholder="Enter New password" />
        </div>
        <div class="col-12 col-sm-6 mb-4">
          <label id="cnp" class="form-label">Confirm New password</label>
          <input name="cnp" type="password" class="form-control" value="Site Coordinator"
            placeholder="Enter Confirm New password" />
        </div>
      </div>
    </div>

    <div class="col-12 d-flex justify-content-end">
      <div class="d-flex align-items-center button--group orange--btn--group">
        <button type="submit" class="btn btn-primary w-100">
          Update Password
        </button>
        <div class="connecter orange--connecter flex-shrink-0"></div>
        <button type="button" class="btn btn-primary flex-shrink-0 sub--round--btn">
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>

  </div>
</div>
