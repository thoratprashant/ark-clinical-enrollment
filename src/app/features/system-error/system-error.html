<div class="container-fluid sa--wrapper d-flex align-items-center justify-content-center">
  <div class="sa--outer d-flex flex-column align-items-center justify-content-center text-center">
    <div class="ico d-flex align-items-center justify-content-center ">
      <img src="images/warning-orange.svg" alt="img" />
    </div>
    <h1 class="clr--171717 font-24 mt-3 mt-sm-3 mb-2 mb-sm-3">Something went wrong</h1>
    <p class="clr--525252 font-16 font-plus-jakarta mb-3 mb-sm-4">An unexpected error occurred. Please try again.</p>
    <div class="d-flex flex-column flex-sm-row gap-2">
      <div class="d-flex align-items-center button--group">
        <button type="submit" class="btn btn-primary w-100">
          <mat-icon class="me-2">cached</mat-icon>
          Retry
        </button>
        <div class="connecter flex-shrink-0"></div>
        <button type="button" class="btn btn-primary flex-shrink-0 sub--round--btn ">
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
      <div class="d-flex align-items-center button--group orange--btn--group">
        <button type="button" class="btn btn-primary w-100">
          <mat-icon class="me-2">west</mat-icon>
          Go Back
        </button>
        <div class="connecter flex-shrink-0"></div>
        <button type="button" class="btn btn-primary flex-shrink-0 sub--round--btn">
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>
    <hr class="w-100 hr--line">
    <p class="font-14 clr--737373 font-plus-jakarta mb-2">If the problem persists, please contact support.</p>
    <div class="d-flex align-items-center font-plus-jakarta">
        <mat-icon>mail</mat-icon>
        <a class="clr--171717 font-14 ms-1"> Contact Support</a>
    </div>
  </div>
</div>
