 <h2 mat-dialog-title>
   Update
   <button matIconButton class="close--btn" mat-dialog-close>
     <mat-icon>close_small</mat-icon>
   </button>
 </h2>

 <mat-dialog-content  >
   <form>
     <div class="row">
        <div class="col-12 mb-4">
         <label class="form-label">Old Password <span class="text-error">*</span></label>
         <div class="position-relative">
           <input [type]="showoldPassword ? 'text' : 'password'" class="form-control pe-5"
             placeholder="Enter New Password">
           <button type="button" mat-icon-button class="icon--password" (click)="toggleOldPassword()">
             <mat-icon fontSet="material-icons-outlined">
               {{ showoldPassword ? 'visibility_off' : 'visibility' }}
             </mat-icon>
           </button>
         </div>
         <!-- <div class="font-13 mt-1 text-danger">Enter valid Email Id or Mobile Number </div> -->
       </div>
       <div class="col-12 mb-4">
         <label class="form-label">New Password <span class="text-error">*</span></label>
         <div class="position-relative">
           <input [type]="showNewPassword ? 'text' : 'password'" class="form-control pe-5"
             placeholder="Enter New Password">
           <button type="button" mat-icon-button class="icon--password" (click)="toggleNewPassword()">
             <mat-icon fontSet="material-icons-outlined">
               {{ showNewPassword ? 'visibility_off' : 'visibility' }}
             </mat-icon>
           </button>
         </div>
       </div>
       <div class="col-12 ">
         <label class="form-label">Confirm Password <span class="text-error">*</span></label>
         <div class="position-relative">
           <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control pe-5"
             placeholder="Enter Confirm Password">
           <button type="button" mat-icon-button class="icon--password" (click)="toggleConfirmPassword()">
             <mat-icon fontSet="material-icons-outlined">
               {{ showConfirmPassword ? 'visibility_off' : 'visibility' }}
             </mat-icon>
           </button>
         </div>
       </div>
     </div>
   </form>
 </mat-dialog-content>

 <mat-dialog-actions align="end">
   <button type="button" class="btn btn-primary" mat-dialog-close (click)="submitChangePassword()">Submit</button>
 </mat-dialog-actions>
