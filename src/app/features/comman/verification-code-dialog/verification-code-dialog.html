<h2 mat-dialog-title>
  Update
  <button matIconButton class="close--btn" mat-dialog-close>
    <mat-icon>close_small</mat-icon>
  </button>
</h2>

<mat-dialog-content>
  <form>
    <div class="row">
      <div class="col-12 mb-1">
        <label class="form-label">Verification Code</label>
        <input type="text" class="form-control"  placeholder="Enter 6 digit Verification Code"> 
      </div>
      <div class="col-12 mt-3">
        <a class="font-16 text-primary">Resend Verification Code</a>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" class="btn btn-primary m-1" mat-dialog-close> Submit </button>
</mat-dialog-actions>
