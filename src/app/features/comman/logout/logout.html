 <h2 mat-dialog-title> 
  <button matIconButton class="close--btn" mat-dialog-close>
     <mat-icon>close_small</mat-icon>
   </button>
</h2> 
 <mat-dialog-content class="text-center">
   <img src="images/logout-img.png" alt="hey" class="logout-img" />
   <h1 class="mt-3">Hey!</h1>
   <p class="font-16 clr--525252">Are you sure you want to log out of your account?</p>
 </mat-dialog-content>

 <mat-dialog-actions align="center" class="mb-3 gap-2 gap-sm-3 flex-sm-nowrap">

   <div class="d-flex align-items-center button--group  flex-shrink-0" mat-dialog-close>
     <button type="button" class="btn btn-primary btn-lg w-100">
       Log Out
     </button>
     <div class="connecter flex-shrink-0"></div>
     <button type="button" class="btn btn-primary btn-lg flex-shrink-0 sub--round--btn">
       <mat-icon>chevron_right</mat-icon>
     </button>
   </div>
   <div class="d-flex align-items-center button--group orange--btn--group flex-shrink-0" mat-dialog-close>
     <button type="submit" class="btn btn-primary btn-lg w-100">
       Log Out from all devices
     </button>
     <div class="connecter orange--connecter flex-shrink-0"></div>
     <button type="button" class="btn btn-primary btn-lg flex-shrink-0 sub--round--btn">
       <mat-icon>chevron_right</mat-icon>
     </button>
   </div>

 </mat-dialog-actions>
