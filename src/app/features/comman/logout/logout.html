 <mat-dialog-content class="text-center">
   <img src="images/hey.png" alt="hey" />
   <h1>Hey!</h1>
   <p class="font-16 clr--525252">Are you sure you want to log out of your account?</p>
 </mat-dialog-content>

 <mat-dialog-actions align="center" class="mb-3 gap-2 gap-sm-3 flex-nowrap">
   <div class="d-flex align-items-center button--group w-100" mat-dialog-close>
     <button type="button" class="btn btn-secondary btn-md w-100">
       Cancel
     </button>
     <div class="connecter connecter-secondary flex-shrink-0"></div>
     <button type="button" class="btn btn-secondary btn-md flex-shrink-0 sub--round--btn">
       <mat-icon>chevron_right</mat-icon>
     </button>
   </div>
   <div class="d-flex align-items-center button--group w-100" mat-dialog-close>
     <button type="button" class="btn btn-primary btn-md w-100" >
       Log Out
     </button>
     <div class="connecter flex-shrink-0"></div>
     <button type="button" class="btn btn-primary btn-md flex-shrink-0 sub--round--btn">
       <mat-icon>chevron_right</mat-icon>
     </button>
   </div>

 </mat-dialog-actions>
