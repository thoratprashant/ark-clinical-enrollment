<div class="login--wrapper d-flex flex-column">
  <h2 class="fw-medium mb-1 text-secondary">Forgot password</h2>
  <p class="mb-4">Enter your email to reset your password</p>

  <form>
    <div class="row">
      <div class="col-12 mb-4">
        <label class="form-label">Email</label> 
        <div class="position-relative input--prefix">
           <mat-icon fontSet="material-icons-outlined">mail</mat-icon>
           <input id="email" type="email" class="form-control" placeholder="Enter registered Email Id" />
         </div>
      </div>
      <div class="col-12">
        <div class="d-flex align-items-center button--group">
          <button type="button" class="btn btn-primary w-100" routerLink="/auth/reset-password">
            Send a Reset Link
          </button>
          <div class="connecter flex-shrink-0"></div>
          <button type="button" class="btn btn-primary flex-shrink-0 sub--round--btn" routerLink="/auth/reset-password">
            <mat-icon>chevron_right</mat-icon>
          </button>
        </div>
      </div>
      <div class="col-12">
        <a class="d-flex justify-content-center font-14 text-center font-inter mt-2 mt-sm-4"
          routerLink="/auth/login">Back to login</a>
      </div>
    </div>
  </form>

</div>
